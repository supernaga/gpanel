name: Deploy GPanel

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/gpanel

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push backend
        run: |
          docker build -t $IMAGE_PREFIX-server:latest ./backend
          docker push $IMAGE_PREFIX-server:latest

      - name: Build & Push frontend
        run: |
          docker build -t $IMAGE_PREFIX-web:latest ./frontend
          docker push $IMAGE_PREFIX-web:latest

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build agent binaries
        run: |
          mkdir -p dist
          cd agent
          go mod download
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../dist/gpanel-agent-linux-amd64 main.go
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o ../dist/gpanel-agent-linux-arm64 main.go

      - name: Publish agent binaries to release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-agent
          files: |
            dist/gpanel-agent-linux-amd64
            dist/gpanel-agent-linux-arm64

      - name: Build & Push agent
        run: |
          docker build -t $IMAGE_PREFIX-agent:latest ./agent
          n=0
          until [ $n -ge 3 ]; do
            docker push $IMAGE_PREFIX-agent:latest && break
            n=$((n+1))
            echo "agent push failed, retry $n/3..."
            sleep 5
          done
          [ $n -lt 3 ]

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Check deploy secrets
        id: check
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ] || [ -z "${{ secrets.DEPLOY_USER }}" ] || [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Deploy secrets missing, skipping deploy job gracefully."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SSH Deploy
        if: steps.check.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            APP_DIR=/opt/gpanel
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/supernaga/gpanel.git $APP_DIR
            fi
            cd $APP_DIR
            git fetch origin
            git reset --hard origin/main

            cat > deploy/.env <<EOF
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            AGENT_TOKEN=${{ secrets.AGENT_TOKEN }}
            ADMIN_USER=${{ secrets.ADMIN_USER }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            IMAGE_PREFIX=ghcr.io/${{ github.repository_owner }}/gpanel
            EOF

            cd deploy
            docker compose pull || true
            docker compose up -d
            docker image prune -f
