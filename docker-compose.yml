services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: gpanel
      POSTGRES_USER: gpanel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpanel -d gpanel"]
      interval: 10s
      timeout: 5s
      retries: 8

  backend:
    build: ./backend
    environment:
      PORT: 8080
      DB_DSN: postgres://gpanel:${POSTGRES_PASSWORD?POSTGRES_PASSWORD is required}@postgres:5432/gpanel?sslmode=disable
      JWT_SECRET: ${JWT_SECRET?JWT_SECRET is required}
      AGENT_TOKEN: ${AGENT_TOKEN?AGENT_TOKEN is required}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD?ADMIN_PASSWORD is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-}
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
