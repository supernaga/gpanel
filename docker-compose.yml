version: '3.9'
services:
  backend:
    image: golang:1.22
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "go mod tidy && go run main.go"
    ports:
      - "8080:8080"

  frontend:
    image: node:22
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_BASE=http://localhost:8080
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - backend
