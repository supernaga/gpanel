version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: gpanel
      POSTGRES_USER: gpanel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpanel -d gpanel"]
      interval: 10s
      timeout: 5s
      retries: 8

  backend:
    image: ${IMAGE_PREFIX}-server:latest
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      DB_DSN: postgres://gpanel:${POSTGRES_PASSWORD}@postgres:5432/gpanel?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      AGENT_TOKEN: ${AGENT_TOKEN}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      WEBHOOK_URL: ${WEBHOOK_URL}
      ALERT_OFFLINE_MINUTES: ${ALERT_OFFLINE_MINUTES:-2}
      ALERT_DEDUPE_MINUTES: ${ALERT_DEDUPE_MINUTES:-5}
      TASK_TIMEOUT_SECONDS: ${TASK_TIMEOUT_SECONDS:-300}
      TASK_MAX_RETRIES: ${TASK_MAX_RETRIES:-3}
      TASK_DISPATCH_PER_NODE: ${TASK_DISPATCH_PER_NODE:-1}
      ALERT_SILENT_HOURS: ${ALERT_SILENT_HOURS:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 8

  frontend:
    image: ${IMAGE_PREFIX}-web:latest
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always

volumes:
  pgdata:
